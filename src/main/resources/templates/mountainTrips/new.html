<!DOCTYPE html>
<html lang="en">

<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>New Mountain Trip</title></head>
<body>
<h1>Create Mountain Trip</h1>
<form th:action="@{/host/mountain-trips}" th:object="${dto}" method="post">
    <!-- All fields like MountainTrip + MountainActivities and destinationPeak and Hut -->
    <div>
        <label>Title</label>
        <input th:field="*{title}" />
        <span style="color:red" th:errors="*{title}"></span>
    </div>
    <!-- ... repeat for other fields ... -->
    <button type="submit">Create</button>
</form>
</body>
</html>
